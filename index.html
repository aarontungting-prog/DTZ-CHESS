<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 WBC 經典賽 - 終極球員資料庫</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Roboto:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body {
            /* WBC 經典深藍背景 */
            background: linear-gradient(135deg, #020617 0%, #0f172a 50%, #1e1b4b 100%);
            color: #f8fafc;
            font-family: 'Noto Sans TC', sans-serif;
            min-height: 100vh;
        }
        .font-roboto { font-family: 'Roboto', sans-serif; }
        
        /* WBC 幾何斜角與金屬質感設計 */
        .wbc-card {
            background: linear-gradient(145deg, rgba(30,41,59,0.8), rgba(15,23,42,0.9));
            border-top: 2px solid #38bdf8;
            border-bottom: 2px solid #ef4444;
            clip-path: polygon(0 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%);
            transition: all 0.3s ease;
        }
        .wbc-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(56, 189, 248, 0.4);
        }
        
        /* 細節視窗的金色點綴 */
        .gold-accent { color: #fbbf24; }
        .gold-border { border-color: #fbbf24; }

        /* 自定義捲軸 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="max-w-7xl mx-auto mb-12 text-center relative">
        <div class="absolute inset-0 bg-blue-500 blur-[100px] opacity-20 z-0 pointer-events-none"></div>
        <h1 class="text-5xl md:text-7xl font-roboto font-black italic tracking-wider mb-2 relative z-10 drop-shadow-lg">
            WORLD BASEBALL <span class="text-red-500">CLASSIC</span> 2026
        </h1>
        <p class="text-xl md:text-2xl text-blue-300 font-bold mb-8 relative z-10">THE ULTIMATE ROSTER DATABASE</p>
        
        <div class="flex flex-wrap justify-center gap-3 relative z-10" id="team-buttons">
            <button onclick="loadTeam('Taiwan')" class="team-btn px-8 py-3 bg-blue-800 hover:bg-blue-600 border border-blue-400 font-bold text-lg rounded shadow-[0_0_15px_rgba(59,130,246,0.5)] transition">中華臺北</button>
            <button onclick="loadTeam('Japan')" class="team-btn px-8 py-3 bg-slate-800 hover:bg-red-800 border border-gray-500 hover:border-red-500 font-bold text-lg rounded transition">日本武士</button>
            <button onclick="loadTeam('USA')" class="team-btn px-8 py-3 bg-slate-800 hover:bg-blue-900 border border-gray-500 hover:border-red-500 font-bold text-lg rounded transition">美國夢幻</button>
            <button onclick="loadTeam('Dominican')" class="team-btn px-8 py-3 bg-slate-800 hover:bg-teal-800 border border-gray-500 hover:border-red-500 font-bold text-lg rounded transition">多明尼加</button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6" id="player-grid">
        <div class="col-span-full text-center text-gray-400 py-10">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500 mx-auto mb-4"></div>
            正在載入頂級球員資料庫...
        </div>
    </main>

    <div id="player-modal" class="fixed inset-0 bg-black/90 hidden z-50 overflow-y-auto">
        <div class="min-h-screen px-4 text-center">
            <span class="inline-block h-screen align-middle" aria-hidden="true">&#8203;</span>
            
            <div class="inline-block w-full max-w-5xl text-left align-middle transition-all transform bg-slate-900 border border-slate-700 shadow-2xl rounded-xl overflow-hidden my-8">
                
                <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-white text-4xl font-black z-10">&times;</button>
                
                <div class="flex flex-col md:flex-row h-full">
                    <div class="w-full md:w-1/3 relative bg-gradient-to-b from-slate-800 to-black p-6 border-r border-slate-700">
                        <div class="absolute top-0 left-0 text-[150px] font-roboto font-black text-white/5 -mt-10 -ml-4" id="modal-bg-number"></div>
                        
                        <div class="relative z-10 flex flex-col items-center h-full">
                            <div class="w-48 h-48 bg-slate-800 rounded-full border-4 border-blue-500 mb-6 flex items-center justify-center overflow-hidden shadow-[0_0_30px_rgba(59,130,246,0.3)]">
                                <span class="text-sm text-center text-gray-500" id="modal-img-hint">球員圖片<br>(檔名對應)</span>
                            </div>
                            
                            <h2 id="modal-name" class="text-4xl font-black mb-1 text-center"></h2>
                            <p id="modal-org" class="text-blue-400 font-bold text-lg mb-4 text-center"></p>
                            
                            <div class="flex gap-4 mb-6">
                                <span class="px-3 py-1 bg-slate-700 rounded text-sm font-bold" id="modal-role"></span>
                                <span class="px-3 py-1 bg-red-900/50 text-red-300 border border-red-700 rounded text-sm font-bold" id="modal-position"></span>
                            </div>

                            <div class="w-full bg-slate-800/50 rounded-lg p-4 mt-auto">
                                <p class="text-sm text-gray-400 flex justify-between mb-2"><span>身高/體重：</span><span class="text-white font-bold" id="modal-hw"></span></p>
                                <p class="text-sm text-gray-400 flex justify-between mb-2"><span>出生日期：</span><span class="text-white font-bold" id="modal-birth"></span></p>
                                <p class="text-sm text-gray-400 flex justify-between"><span>背號：</span><span class="text-white font-bold text-xl" id="modal-number-display"></span></p>
                            </div>
                        </div>
                    </div>

                    <div class="w-full md:w-2/3 p-6 md:p-8 bg-slate-900 overflow-y-auto max-h-[80vh]">
                        
                        <div class="mb-8">
                            <h3 class="text-2xl font-black border-l-4 gold-border pl-3 mb-4 flex items-center gap-2">
                                <span class="text-xl">📋</span> 2026 戰力分析 / 球探報告
                            </h3>
                            <p id="modal-scouting" class="text-gray-300 leading-relaxed text-justify bg-slate-800/30 p-4 rounded-lg border border-slate-700"></p>
                        </div>

                        <div class="mb-8">
                            <h3 class="text-2xl font-black border-l-4 border-blue-500 pl-3 mb-4 flex items-center gap-2">
                                <span class="text-xl">🏆</span> 生涯榮譽榜
                            </h3>
                            <div id="modal-accolades" class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                </div>
                        </div>

                        <div>
                            <h3 class="text-2xl font-black border-l-4 border-red-500 pl-3 mb-4 flex items-center gap-2">
                                <span class="text-xl">📊</span> 關鍵數據表現
                            </h3>
                            <div class="overflow-x-auto">
                                <table class="w-full text-left border-collapse">
                                    <thead class="bg-slate-800 text-gray-400 text-sm uppercase font-roboto">
                                        <tr id="stats-header">
                                            </tr>
                                    </thead>
                                    <tbody class="text-white font-roboto font-bold text-lg border-b border-slate-700" id="stats-body">
                                        </tbody>
                                </table>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allPlayersData = [];

        // 讀取外部 JSON 檔案
        async function fetchPlayersData() {
            try {
                // 這裡我們預期會有一個 players.json 檔案
                const response = await fetch('players.json');
                if (!response.ok) throw new Error('找不到 players.json 檔案！');
                allPlayersData = await response.json();
                
                // 預設載入中華隊
                loadTeam('Taiwan');
            } catch (error) {
                console.error("讀取資料失敗:", error);
                document.getElementById('player-grid').innerHTML = `
                    <div class="col-span-full text-center py-10">
                        <p class="text-red-400 text-xl font-bold mb-4">⚠️ 無法載入資料庫 (players.json)</p>
                        <p class="text-gray-400">因為目前是直接雙擊開啟 HTML，瀏覽器基於安全性可能會阻擋讀取本地 JSON。<br>
                        請在 VS Code 中使用「Live Server」套件開啟，或是等待我為你生成包含在檔案內的測試版資料。</p>
                    </div>
                `;
            }
        }

        function loadTeam(teamId) {
            // 更新按鈕樣式
            document.querySelectorAll('.team-btn').forEach(btn => {
                btn.classList.remove('bg-blue-800', 'border-blue-400', 'shadow-[0_0_15px_rgba(59,130,246,0.5)]');
                btn.classList.add('bg-slate-800', 'border-gray-500');
                if(btn.getAttribute('onclick').includes(teamId)) {
                    btn.classList.remove('bg-slate-800', 'border-gray-500');
                    btn.classList.add('bg-blue-800', 'border-blue-400', 'shadow-[0_0_15px_rgba(59,130,246,0.5)]');
                }
            });

            const grid = document.getElementById('player-grid');
            grid.innerHTML = '';
            
            const teamPlayers = allPlayersData.filter(p => p.team === teamId);
            
            teamPlayers.forEach(player => {
                const card = document.createElement('div');
                card.className = 'wbc-card p-5 cursor-pointer flex flex-col h-full';
                card.onclick = () => showModal(player);
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <span class="font-roboto font-black text-3xl text-gray-500/50">#${player.number}</span>
                        <span class="text-xs font-bold px-2 py-1 bg-slate-800 border border-slate-600 rounded text-gray-300">${player.position}</span>
                    </div>
                    <h3 class="text-2xl font-black mb-1 text-white">${player.name}</h3>
                    <p class="text-xs text-blue-400 font-bold mb-4 line-clamp-1">${player.organization}</p>
                    <div class="mt-auto border-t border-slate-700/50 pt-3 flex justify-between items-center text-sm font-bold text-gray-400">
                        <span>${player.role}</span>
                        <span class="text-red-500 flex items-center gap-1">DETAILS <span class="text-lg">»</span></span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function showModal(player) {
            document.getElementById('modal-bg-number').textContent = player.number;
            document.getElementById('modal-number-display').textContent = player.number;
            document.getElementById('modal-name').textContent = player.name;
            document.getElementById('modal-org').textContent = player.organization;
            document.getElementById('modal-role').textContent = player.role;
            document.getElementById('modal-position').textContent = player.position;
            document.getElementById('modal-hw').textContent = player.physical;
            document.getElementById('modal-birth').textContent = player.birth;
            document.getElementById('modal-img-hint').innerHTML = `${player.name}.png`;
            document.getElementById('modal-scouting').innerHTML = player.scoutingReport;

            // 榮譽榜
            const accoladesDiv = document.getElementById('modal-accolades');
            accoladesDiv.innerHTML = player.accolades.map(acc => 
                `<div class="bg-slate-800/50 p-3 rounded border border-slate-700/50 flex items-start gap-2">
                    <span class="gold-accent mt-0.5">★</span>
                    <span class="text-sm font-bold text-gray-200">${acc}</span>
                </div>`
            ).join('');

            // 數據表處理 (區分投手與打者)
            const statsHeader = document.getElementById('stats-header');
            const statsBody = document.getElementById('stats-body');
            
            if (player.statsType === 'pitcher') {
                statsHeader.innerHTML = '<th class="py-3 px-4">W-L</th><th class="py-3 px-4">ERA</th><th class="py-3 px-4">IP</th><th class="py-3 px-4">SO</th><th class="py-3 px-4">WHIP</th>';
                statsBody.innerHTML = `<tr>
                    <td class="py-4 px-4">${player.stats.wl}</td>
                    <td class="py-4 px-4 text-blue-400">${player.stats.era}</td>
                    <td class="py-4 px-4">${player.stats.ip}</td>
                    <td class="py-4 px-4">${player.stats.so}</td>
                    <td class="py-4 px-4 text-red-400">${player.stats.whip}</td>
                </tr>`;
            } else {
                statsHeader.innerHTML = '<th class="py-3 px-4">AVG</th><th class="py-3 px-4">HR</th><th class="py-3 px-4">RBI</th><th class="py-3 px-4">OBP</th><th class="py-3 px-4">OPS</th>';
                statsBody.innerHTML = `<tr>
                    <td class="py-4 px-4 text-blue-400">${player.stats.avg}</td>
                    <td class="py-4 px-4">${player.stats.hr}</td>
                    <td class="py-4 px-4">${player.stats.rbi}</td>
                    <td class="py-4 px-4">${player.stats.obp}</td>
                    <td class="py-4 px-4 text-red-400">${player.stats.ops}</td>
                </tr>`;
            }

            document.getElementById('player-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('player-modal').classList.add('hidden');
        }

        // 啟動
        window.onload = fetchPlayersData;
    </script>
</body>
</html>
